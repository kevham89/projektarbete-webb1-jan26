<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US</title>
    <link rel="stylesheet" href="CSS/contact.css">
</head>
<body>
    <form action="#" method="post">
        
        <label for="name" class="name"><mark>Insert name here:</mark></label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email" class="email"><mark>To whom will we reply to (e-mail):</mark></label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="message" class="message"><mark>Your concern:</mark></label><br>
        <textarea id="message" name="message" rows="5" cols="30" required></textarea><br><br>

       <button type="submit" class="button">Push the button</button> 
    </form>
</body>
</html>
