<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US</title> <!-- Titeln till sidan -->
    <link rel="stylesheet" href="CSS/contact.css"> <!-- Länkar till en extern CSS-fil som innehåller stilar för sidan. href="CSS/contact.css" anger sökvägen till CSS-filen. -->
</head>
<body>
    <form action="#" method="post"> <!-- Formulär som skickar data till servern. <form> skapar ett formulär. action="#" betyder att formuläret skickas till samma sida. method="post" skickar data via HTTP POST. -->
        
        <label for="name" class="name"><mark>Insert name here:</mark></label><br> <!-- Fält för namn -->
        <input type="text" id="name" name="name" required><br><br>

        <label for="email" class="email"><mark>To whom will we reply to (e-mail):</mark></label><br> <!-- Fält för e-post -->
        <input type="email" id="email" name="email" required><br><br>

        <label for="message" class="message"><mark>Your concern:</mark></label><br> <!-- Meddelandefält -->
        <textarea id="message" name="message" rows="5" cols="30" required></textarea><br><br>

       <button type="submit" class="button">Push the button</button> <!-- Skicka-knapp -->
    </form>
</body>
</html>
